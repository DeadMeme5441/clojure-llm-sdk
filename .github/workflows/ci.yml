name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Lint, test, and build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Clojure tools
        uses: DeLaGuardo/setup-clojure@13.6.1
        with:
          cli: latest
          clj-kondo: latest

      - name: Cache Clojure dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
            .cpcache
          key: clojure-${{ runner.os }}-${{ hashFiles('deps.edn') }}
          restore-keys: |
            clojure-${{ runner.os }}-

      - name: Lint
        run: clj-kondo --lint src test

      - name: Unit tests
        run: clojure -M:test

      - name: Build jar
        run: clojure -T:build jar
